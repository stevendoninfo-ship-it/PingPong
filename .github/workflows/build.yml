name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblldb-dev libffi-dev libreadline-dev libdb5.3-dev libncurses5-dev libncursesw5-dev ccache zip unzip openjdk-17-jdk
        pip install --upgrade pip setuptools
        pip install buildozer cython

    - name: Build APK with Buildozer
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,pygame/g' buildozer.spec
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.1
      with:
        name: PingPong-APK
        path: bin/*.apk
