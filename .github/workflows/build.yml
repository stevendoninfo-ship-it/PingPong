name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.10
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev \
          zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev \
          libffi-dev libreadline-dev libncurses5-dev libncursesw5-dev \
          ccache zip unzip openjdk-17-jdk git autoconf automake \
          libtool pkg-config

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer cython

    - name: Initialize buildozer
      run: buildozer init

    - name: Configure buildozer.spec for Pygame
      run: |
        sed -i 's/^title = My Application/title = PingPong/g' buildozer.spec
        sed -i 's/^package.name = myapp/package.name = pingpong/g' buildozer.spec
        sed -i 's/^package.domain = org.test/package.domain = com.example/g' buildozer.spec
        sed -i 's/^version = 0.1/version = 1.0/g' buildozer.spec
        sed -i 's/^requirements = python3,kivy/requirements = python3,pygame,pyjnius/g' buildozer.spec
        sed -i 's/^orientation = portrait/orientation = portrait/g' buildozer.spec
        sed -i 's/^fullscreen = 0/fullscreen = 1/g' buildozer.spec

    - name: Build APK with Buildozer
      run: buildozer -v android debug
      timeout-minutes: 180

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.1
      if: success()
      with:
        name: PingPong-APK
        path: bin/*.apk
        retention-days: 30
